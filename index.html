<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Label Material & Export</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 15px; 
            background-color: #f4f7f6; 
            color: #333; 
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
        }
        h2 { 
            text-align: center; 
            color: #2c3e50; 
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 22px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 14px;
        }
        #reader { 
            width: 100%; 
            border-radius: 8px; 
            overflow: hidden; 
            border: 2px solid #e2e8f0; 
            background-color: #000;
        }
        #reader __dashboard { padding: 10px !important; }
        #reader button {
            background-color: #4a5568;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        #reader select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #cbd5e0;
            margin-bottom: 10px;
            width: 100%;
        }
        .counter { 
            text-align: center; 
            margin: 15px 0 5px 0; 
            font-size: 18px; 
            font-weight: bold; 
            color: #2b6cb0; 
            background: #ebf8ff;
            padding: 10px;
            border-radius: 6px;
        }
        /* Style baru untuk notifikasi duplikat */
        #status-msg {
            text-align: center;
            font-weight: bold;
            height: 20px;
            margin-bottom: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn-group { 
            display: flex; 
            gap: 10px; 
        }
        .btn { 
            flex: 1; 
            padding: 14px; 
            font-size: 15px; 
            font-weight: bold; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-excel { background-color: #2f855a; color: white; }
        .btn-clear { background-color: #e53e3e; color: white; flex: 0.5; }
        .table-section { margin-top: 25px; }
        .table-section h3 { margin-bottom: 10px; color: #4a5568; font-size: 16px; }
        .table-wrapper { overflow-x: auto; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f7fafc; color: #4a5568; font-weight: 600; }
        tr:nth-child(even) { background-color: #f8fafc; }
        .scan-success { background-color: #c6f6d5 !important; animation: fadeOutHighlight 2s forwards; }
        @keyframes fadeOutHighlight {
            from { background-color: #c6f6d5; }
            to { background-color: transparent; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Material Barcode Scanner</h2>
    <p class="subtitle">Scan via kamera HP & Export ke Excel (CSV)</p>
    
    <div id="reader"></div>
    
    <div class="counter">📦 Total Terbaca: <span id="total-count">0</span> Item</div>
    
    <div id="status-msg"></div>
    
    <div class="btn-group">
        <button class="btn btn-excel" id="btn-export">📥 Unduh Data</button>
        <button class="btn btn-clear" id="btn-clear">🗑️ Reset</button>
    </div>
    
    <div class="table-section">
        <h3>Preview Data Sementara:</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th style="width: 50px;">No</th>
                        <th>Kode Barcode / SN</th>
                        <th>Waktu Scan</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="3" style="text-align: center; color: #a0aec0; padding: 20px;">
                            Belum ada data. Arahkan kamera ke barcode.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let scannedData = [];
    let lastScannedCode = "";
    let lastScanTime = 0;

    function onScanSuccess(decodedText, decodedResult) {
        const currentTime = new Date().getTime();
        const statusMsg = document.getElementById('status-msg');
        
        // 1. Validasi Array: Cek apakah barcode sudah ada di seluruh list scannedData
        const isDuplicate = scannedData.some(item => item.Kode_Barcode_SN === decodedText);

        if (isDuplicate) {
            // Mencegah peringatan muncul terlalu cepat dan berkedip (beri jeda 2 detik untuk peringatan)
            if (decodedText !== lastScannedCode || (currentTime - lastScanTime > 2000)) {
                statusMsg.innerText = "⚠️ Barcode ini sudah masuk di list!";
                statusMsg.style.color = "#e53e3e"; // Warna merah
                
                // Hilangkan pesan setelah 2 detik
                setTimeout(() => { 
                    if(statusMsg.innerText.includes("⚠️")) statusMsg.innerText = ""; 
                }, 2000);
                
                lastScannedCode = decodedText;
                lastScanTime = currentTime;
            }
            return; // Hentikan proses, jangan simpan dan jangan bunyi beep
        }
        
        // 2. Jika lolos validasi (data baru), simpan dan proses
        lastScannedCode = decodedText;
        lastScanTime = currentTime;
        
        playBeepSound();
        
        // Tampilkan indikator sukses
        statusMsg.innerText = "✅ Berhasil discan!";
        statusMsg.style.color = "#2f855a"; // Warna hijau
        setTimeout(() => { 
            if(statusMsg.innerText.includes("✅")) statusMsg.innerText = ""; 
        }, 2000);
        
        const waktuSekarang = new Date().toLocaleString('id-ID', { 
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit' 
        });
        
        const nomorUrut = scannedData.length + 1;
        scannedData.push({
            "No": nomorUrut,
            "Kode_Barcode_SN": decodedText,
            "Waktu_Scan": waktuSekarang
        });
        
        updateUiView();
    }

    function playBeepSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = "sine";
            oscillator.frequency.setValueAtTime(900, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.12);
        } catch (e) { 
            console.log("Audio tidak didukung."); 
        }
    }

    function updateUiView() {
        const tbody = document.getElementById('table-body');
        document.getElementById('total-count').innerText = scannedData.length;
        
        if (scannedData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #a0aec0; padding: 20px;">Belum ada data.</td></tr>`;
            return;
        }
        
        let tableRowsHtml = "";
        for (let i = scannedData.length - 1; i >= 0; i--) {
            const item = scannedData[i];
            const isLatestRow = (i === scannedData.length - 1) ? "class='scan-success'" : "";
            
            tableRowsHtml += `<tr ${isLatestRow}>
                <td>${item.No}</td>
                <td style="font-family: monospace; font-size: 15px; font-weight: bold;">${item.Kode_Barcode_SN}</td>
                <td style="color: #718096; font-size: 13px;">${item.Waktu_Scan}</td>
            </tr>`;
        }
        tbody.innerHTML = tableRowsHtml;
    }

    document.getElementById('btn-export').addEventListener('click', function() {
        if (scannedData.length === 0) {
            alert("⚠️ Belum ada data material yang di-scan!");
            return;
        }

        let csvContent = "No,Kode Barcode/SN,Waktu Scan\n";
        
        scannedData.forEach(function(row) {
            let baris = `"${row.No}","${row.Kode_Barcode_SN}","${row.Waktu_Scan}"`;
            csvContent += baris + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        
        const dateStamp = new Date().toISOString().slice(0,10);
        link.setAttribute("href", url);
        link.setAttribute("download", `Rekap_Scan_${dateStamp}.csv`);
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    document.getElementById('btn-clear').addEventListener('click', function() {
        if (scannedData.length === 0) return;
        if (confirm("⚠️ Yakin hapus semua data scan?")) {
            scannedData = [];
            lastScannedCode = "";
            document.getElementById('status-msg').innerText = "";
            updateUiView();
        }
    });

    const html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", 
        { 
            fps: 10,
            rememberLastUsedCamera: true,
            supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
        },
        false
    );
    
    html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
